services:
  - type: web
    name: url-shortener
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BASE_URL
        sync: false
      - key: STORAGE_MODE
        value: postgres
      - key: DATABASE_URL
        fromDatabase:
          name: url-shortener-db
          property: connectionString
      - key: DATABASE_SSL
        value: false
      - key: CACHE_MODE
        value: memory
      - key: CODE_LENGTH
        value: 6
      - key: RECENT_VISIT_LIMIT
        value: 10
      - key: ANALYTICS_INGEST_INTERVAL_MS
        value: 250
      - key: ANALYTICS_FLUSH_INTERVAL_MS
        value: 5000

databases:
  - name: url-shortener-db
    plan: free
